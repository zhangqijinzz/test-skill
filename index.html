<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
  }

  .login-container {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
  }

  .login-header {
    text-align: center;
    margin-bottom: 36px;
  }

  .login-header h1 {
    font-size: 28px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 8px;
  }

  .login-header p {
    font-size: 14px;
    color: #6b7280;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: #374151;
    margin-bottom: 8px;
  }

  .form-group input {
    width: 100%;
    padding: 12px 16px;
    font-size: 15px;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    outline: none;
    transition: all 0.2s ease;
    background: #fafafa;
  }

  .form-group input:focus {
    border-color: #667eea;
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  .form-group input::placeholder {
    color: #9ca3af;
  }

  .form-options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    font-size: 13px;
  }

  .remember-me {
    display: flex;
    align-items: center;
    color: #6b7280;
    cursor: pointer;
  }

  .remember-me input[type="checkbox"] {
    width: 16px;
    height: 16px;
    margin-right: 8px;
    accent-color: #667eea;
    cursor: pointer;
  }

  .forgot-password {
    color: #667eea;
    text-decoration: none;
    font-weight: 500;
  }

  .forgot-password:hover {
    text-decoration: underline;
  }

  .login-button {
    width: 100%;
    padding: 13px 24px;
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .login-button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.35);
  }

  .login-button:active {
    transform: translateY(0);
  }

  .signup-link {
    text-align: center;
    margin-top: 28px;
    font-size: 14px;
    color: #6b7280;
  }

  .signup-link a {
    color: #667eea;
    text-decoration: none;
    font-weight: 500;
  }

  .signup-link a:hover {
    text-decoration: underline;
  }

  .divider {
    display: flex;
    align-items: center;
    margin: 28px 0;
    color: #9ca3af;
    font-size: 13px;
  }

  .divider::before,
  .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #e5e7eb;
  }

  .divider span {
    padding: 0 16px;
  }

  .social-login {
    display: flex;
    gap: 12px;
  }

  .social-btn {
    flex: 1;
    padding: 10px;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    background: #ffffff;
    cursor: pointer;
    font-size: 13px;
    color: #374151;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s ease;
  }

  .social-btn:hover {
    border-color: #d1d5db;
    background: #f9fafb;
  }
</style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>欢迎回来</h1>
      <p>请登录您的账户继续</p>
    </div>

    <form>
      <div class="form-group">
        <label for="username">用户名 / 邮箱</label>
        <input type="text" id="username" placeholder="请输入用户名或邮箱">
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码">
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox">
          记住我
        </label>
        <a href="#" class="forgot-password">忘记密码？</a>
      </div>

      <button type="submit" class="login-button">登 录</button>
    </form>

    <div class="divider">
      <span>或使用以下方式登录</span>
    </div>

    <div class="social-login">
      <button class="social-btn">
        <span>微 信</span>
      </button>
      <button class="social-btn">
        <span>微 博</span>
      </button>
      <button class="social-btn">
        <span>GitHub</span>
      </button>
    </div>

    <div class="signup-link">
      还没有账号？<a href="#">立即注册</a>
    </div>
  </div>
</body>
</html>
